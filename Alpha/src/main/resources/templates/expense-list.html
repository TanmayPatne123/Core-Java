<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>All Expenses</title>
<link rel="stylesheet" th:href="@{/expense.css}">
</head>

<body>

<div class="container">

<h2>All Expenses</h2>

<table>

<tr>
<th>Name</th>
<th>Amount</th>
<th>Date</th>
<th>Description</th>
<th>Action</th>
</tr>

<tr th:each="exp : ${expenses}">
<td th:text="${exp.expenseName}"></td>
<td th:text="${exp.amount}"></td>
<td th:text="${exp.date}"></td>
<td th:text="${exp.description}"></td>

<td>

<a th:href="@{/edit-expense/{id}(id=${exp.id})}">
<button class="btn edit-btn">Edit</button>
</a>

<a th:href="@{/delete-expense/{id}(id=${exp.id})}"
onclick="return confirm('Are you sure?')">

<button class="btn delete-btn">Delete</button>

</a>

</td>

</tr>

</table>

<br>

<a th:href="@{/dashboard}">
<button class="btn add-btn">Back</button>
</a>

</div>

</body>
</html>
